<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #hint {
      position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      color: #555; font: 12px/1 sans-serif;
      pointer-events: none; white-space: nowrap;
    }
    #error {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #f66; font: 14px sans-serif;
      display: none; text-align: center; max-width: 80%; white-space: pre-wrap;
    }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #888; font: 14px sans-serif;
    }
  </style>
</head>
<body>
  <div id="hint">Left-drag to pan &nbsp;|&nbsp; Right-drag to lean left/right &nbsp;|&nbsp; Scroll to zoom &nbsp;|&nbsp; Press B to toggle bones</div>
  <div id="error"></div>
  <div id="loading">Loading...</div>
  <canvas id="canvas"></canvas>

  <script src="spine-webgl-4.0.js"></script>
  <script src="common.js"></script>
  <script>
    document.getElementById('loading').style.display = 'none';

    var canvas = document.getElementById('canvas');
    // premultipliedAlpha:true matches the spine-webgl convention so the
    // framebuffer composites correctly with whatever sits behind the canvas
    // (Qt widget bg can be white, which leaks through partial-alpha regions
    // otherwise).
    var gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: true });
    if (!gl) {
      var el = document.getElementById('error');
      el.textContent = 'WebGL is not available.';
      el.style.display = 'block';
      throw new Error('WebGL unavailable');
    }

    // Force explicit non-premultiply-on-upload so textures land on the GPU
    // exactly as the bytes on disk — otherwise QtWebEngine/Chromium may
    // auto-premultiply, and PMA-on-disk atlases end up double-PMA on the GPU
    // (no blend-mode toggle can recover from that).
    spine.GLTexture.DISABLE_UNPACK_PREMULTIPLIED_ALPHA_WEBGL = true;

    var assetManager = new spine.AssetManager(gl);
    var renderer = new spine.SceneRenderer(canvas, gl);

    var currentSkeleton = null;
    var currentState = null;
    var currentSkelUrl = null;
    var currentAtlasUrl = null;
    var pma = false;
    var lastTime = 0;
    var loadToken = 0;

    var availableAnimations = [];
    var hiddenSlots = new Set();
    var originalAttachments = new Map();
    var highlightedSlot = null;
    var showBones = false;

    var meshBones = new Set();
    var boneShakes = new Map();
    var shakeNeighborCount = 6;
    var shakeBounceForce = 4;
    const SHAKE_RADIUS_FRAC = 0.08;

    var isDragging = false;
    var isRightDragging = false;
    var prevX = 0, prevY = 0;
    var downTime = 0, downPos = null;
    var targetTurnX = 0;
    var currentTurnX = 0;
    var lastClickPoint = null;

    var BONE_LINE_COLOR = new spine.Color(0.27, 0.47, 0.67, 0.6);
    var BONE_RED       = new spine.Color(1, 0.33, 0.27, 0.9);
    var BONE_PURPLE    = new spine.Color(0.8, 0.4, 1, 0.85);
    var BONE_GREEN     = new spine.Color(0.4, 0.87, 0.53, 0.85);
    var BONE_GRAY      = new spine.Color(0.4, 0.4, 0.4, 0.4);
    var BONE_PULSE     = new spine.Color(1, 1, 0.4, 0.4);

    canvas.addEventListener('pointerdown', function (e) {
      if (e.button === 0 || e.button === 2) {
        downTime = Date.now();
        downPos = { x: e.clientX, y: e.clientY };
      }
      if (e.button === 0 || e.button === 1) {
        isDragging = true;
        prevX = e.clientX;
        prevY = e.clientY;
      } else if (e.button === 2) {
        isRightDragging = true;
        prevX = e.clientX;
        prevY = e.clientY;
        try { canvas.requestPointerLock(); } catch (err) {}
      }
    });

    window.addEventListener('pointerup', function (e) {
      if (e.button === 0 || e.button === 1) isDragging = false;
      if (e.button === 2) {
        isRightDragging = false;
        targetTurnX = 0;
        try { document.exitPointerLock(); } catch (err) {}
      }
      if (!downPos) return;
      var dx = e.clientX - downPos.x;
      var dy = e.clientY - downPos.y;
      var dt = Date.now() - downTime;
      if (Math.hypot(dx, dy) < 5 && dt < 200) {
        if (e.button === 0) {
          var w = clientToWorld(e.clientX, e.clientY);
          handleBoneClick(w.x, w.y);
        } else if (e.button === 2) {
          targetTurnX = 0;
        }
      }
      downPos = null;
    });

    window.addEventListener('pointermove', function (e) {
      if (isDragging) {
        var rect = canvas.getBoundingClientRect();
        var cam = renderer.camera;
        // Convert pixel delta to world delta via camera projection. Mirrors
        // spine-webgl's CameraController so the same gesture moves the same
        // distance regardless of zoom/DPR.
        var origin = cam.screenToWorld(new spine.Vector3(0, 0, 0), rect.width, rect.height);
        var moved = cam.screenToWorld(new spine.Vector3(e.clientX - prevX, e.clientY - prevY, 0), rect.width, rect.height);
        cam.position.x -= (moved.x - origin.x);
        cam.position.y -= (moved.y - origin.y);
        prevX = e.clientX;
        prevY = e.clientY;
      } else if (isRightDragging) {
        var dx = (document.pointerLockElement === canvas && e.movementX !== undefined)
                 ? e.movementX
                 : (e.clientX - prevX);
        targetTurnX += dx;
        var maxTurn = canvas.clientWidth * 0.5;
        targetTurnX = Math.max(-maxTurn, Math.min(maxTurn, targetTurnX));
        prevX = e.clientX;
        prevY = e.clientY;
      }
    });

    canvas.addEventListener('wheel', function (e) {
      e.preventDefault();
      var factor = e.deltaY > 0 ? 1.1 : 0.9;
      renderer.camera.zoom = Math.max(0.001, renderer.camera.zoom * factor);
    }, { passive: false });

    window.addEventListener('contextmenu', function (e) { e.preventDefault(); });

    window.addEventListener('keydown', function (e) {
      if (e.key === 'b' || e.key === 'B') {
        showBones = !showBones;
        console.log('BONES_TOGGLED:' + showBones);
      }
    });

    function clientToWorld(clientX, clientY) {
      var rect = canvas.getBoundingClientRect();
      var v = new spine.Vector3(clientX - rect.left, clientY - rect.top, 0);
      renderer.camera.screenToWorld(v, rect.width, rect.height);
      return { x: v.x, y: v.y };
    }

    window.loadModel = async function (url) {
      var dot = url.lastIndexOf('.');
      var atlasUrl = (dot >= 0 ? url.substring(0, dot) : url) + '.atlas';
      var isBinary = url.toLowerCase().endsWith('.skel');

      document.getElementById('error').style.display = 'none';

      // Drop previous model assets so a reload (e.g. PMA toggle) re-fetches.
      if (currentSkelUrl) { try { assetManager.remove(currentSkelUrl); } catch (_) {} }
      if (currentAtlasUrl) { try { assetManager.remove(currentAtlasUrl); } catch (_) {} }
      currentSkeleton = null;
      currentState = null;
      boneShakes.clear();
      targetTurnX = 0;
      currentTurnX = 0;
      lastClickPoint = null;

      var token = ++loadToken;
      currentSkelUrl = url;
      currentAtlasUrl = atlasUrl;

      try {
        if (isBinary) assetManager.loadBinary(url);
        else assetManager.loadText(url);
        assetManager.loadTextureAtlas(atlasUrl);

        await assetManager.loadAll();
        if (token !== loadToken) return;
        if (assetManager.hasErrors()) {
          throw new Error(JSON.stringify(assetManager.getErrors()));
        }

        var atlas = assetManager.get(atlasUrl);
        var atlasLoader = new spine.AtlasAttachmentLoader(atlas);
        var skelLoader = isBinary
          ? new spine.SkeletonBinary(atlasLoader)
          : new spine.SkeletonJson(atlasLoader);
        var rawSkel = assetManager.get(url);
        var data = isBinary
          ? skelLoader.readSkeletonData(new Uint8Array(rawSkel))
          : skelLoader.readSkeletonData(rawSkel);

        currentSkeleton = new spine.Skeleton(data);
        currentSkeleton.setToSetupPose();
        currentSkeleton.updateWorldTransform();

        var stateData = new spine.AnimationStateData(data);
        currentState = new spine.AnimationState(stateData);
        installShakeHook(currentState);

        // Default PMA flag from atlas pages[0]; user toggle overrides later.
        pma = atlas.pages.length > 0 && atlas.pages[0].pma === true;

        meshBones = L2D.computeMeshBones(currentSkeleton);
        L2D.computeHeadStructure(currentSkeleton);
        console.log('Mesh-driving bones: ' + meshBones.size + ' / ' + currentSkeleton.bones.length);

        var rect = canvas.getBoundingClientRect();
        var bounds = currentSkeleton.getBoundsRect();
        if (isFinite(bounds.width) && bounds.width > 0 && isFinite(bounds.height) && bounds.height > 0) {
          renderer.camera.position.x = bounds.x + bounds.width / 2;
          renderer.camera.position.y = bounds.y + bounds.height / 2;
          var fitX = bounds.width / rect.width;
          var fitY = bounds.height / rect.height;
          renderer.camera.zoom = Math.max(fitX, fitY) / 0.9;
        } else {
          renderer.camera.position.x = 0;
          renderer.camera.position.y = 0;
          renderer.camera.zoom = 1;
        }

        availableAnimations = data.animations.map(function (a) { return a.name; });
        console.log('MODEL_ANIMATIONS:' + JSON.stringify(availableAnimations));

        hiddenSlots.clear();
        originalAttachments.clear();
        highlightedSlot = null;
        showBones = false;
        currentSkeleton.slots.forEach(function (s) {
          originalAttachments.set(s.data.name, s.getAttachment());
        });
        var slotNames = currentSkeleton.slots
          .filter(function (s) { return originalAttachments.get(s.data.name); })
          .map(function (s) { return s.data.name; });
        console.log('MODEL_SLOTS:' + JSON.stringify(slotNames));

        if (availableAnimations.length > 0) {
          currentState.setAnimation(0, availableAnimations[L2D.pickDefaultAnim(availableAnimations)], true);
        }
      } catch (err) {
        if (token !== loadToken) return;
        var el = document.getElementById('error');
        el.textContent = 'Failed to load model:\n' + (err && err.message ? err.message : String(err));
        el.style.display = 'block';
      }
    };

    window.playAnimation = function (index) {
      if (!currentState) return;
      if (index === -1) {
        currentState.clearTracks();
        currentSkeleton.setToSetupPose();
        return;
      }
      if (index < 0 || index >= availableAnimations.length) return;
      currentState.setAnimation(0, availableAnimations[index], true);
    };

    window.setAnimPaused = function (paused) {
      if (currentState) currentState.timeScale = paused ? 0 : 1;
    };

    window.highlightSlot = function (slotName) { highlightedSlot = slotName; };

    window.clearHighlight = function () {
      highlightedSlot = null;
      if (!currentSkeleton) return;
      currentSkeleton.slots.forEach(function (s) {
        s.color.r = 1; s.color.g = 1; s.color.b = 1; s.color.a = 1;
      });
    };

    window.setSlotVisible = function (slotName, visible) {
      if (!currentSkeleton) return;
      var slot = currentSkeleton.findSlot(slotName);
      if (!slot) return;
      if (visible) {
        hiddenSlots.delete(slotName);
        slot.setAttachment(originalAttachments.get(slotName) || null);
      } else {
        hiddenSlots.add(slotName);
        slot.setAttachment(null);
      }
    };

    window.setNeighborCount = function (n) { shakeNeighborCount = n; };
    window.setBounceForce = function (n) { shakeBounceForce = n; };
    window.setShowBones = function (visible) { showBones = !!visible; };
    window.setPremultipliedAlpha = function (enabled) { pma = !!enabled; };

    function handleBoneClick(worldX, worldY) {
      if (!currentSkeleton) return;
      var bones = currentSkeleton.bones;
      var bestBone = null;
      var bestDist = Infinity;
      for (var i = 0; i < bones.length; i++) {
        var b = bones[i];
        if (!b.parent) continue;
        if (!meshBones.has(b)) continue;
        var dx = worldX - b.worldX;
        var dy = worldY - b.worldY;
        var d = dx * dx + dy * dy;
        if (d < bestDist) { bestDist = d; bestBone = b; }
      }
      if (bestBone) applyShakeChain(bestBone, worldX, worldY);
    }

    function applyShakeChain(clickedBone, clickX, clickY) {
      var bounds = currentSkeleton.getBoundsRect();
      var maxRadius = Math.hypot(bounds.width, bounds.height) * SHAKE_RADIUS_FRAC;
      var maxRadiusSq = maxRadius * maxRadius;
      var bones = currentSkeleton.bones;
      var candidates = [];
      for (var i = 0; i < bones.length; i++) {
        var b = bones[i];
        if (!b.parent) continue;
        if (!meshBones.has(b)) continue;
        var dx = b.worldX - clickedBone.worldX;
        var dy = b.worldY - clickedBone.worldY;
        var d = dx * dx + dy * dy;
        if (d > maxRadiusSq) continue;
        candidates.push({ bone: b, distSq: d });
      }
      candidates.sort(function (a, b) { return a.distSq - b.distSq; });
      var picked = candidates.slice(0, shakeNeighborCount);
      var falloffRadius = picked.length > 0
        ? Math.max(Math.sqrt(picked[picked.length - 1].distSq), 1)
        : maxRadius;
      lastClickPoint = { x: clickX, y: clickY, radius: falloffRadius, age: 0 };
      for (var k = 0; k < picked.length; k++) {
        var dist = Math.sqrt(picked[k].distSq);
        var falloff = 1 - dist / falloffRadius;
        L2D.applyShake(picked[k].bone, (shakeBounceForce + 1) * 0.5 * falloff, boneShakes);
      }
    }

    // Patch state.apply so shake offsets land AFTER animation runs every
    // frame. Subtract the previous frame's offset BEFORE animation, then
    // re-add the current offset AFTER. For keyed bones, animation overwrites
    // the cleaned value; for non-keyed bones, the cleaned value persists.
    // Either way, offsets compose cleanly without the heuristic-keyed-detect
    // that caused stack/reset oscillation (the lean-induced flashing).
    function installShakeHook(state) {
      var orig = state.apply.bind(state);
      var lastAppliedShakes = new Map();
      state.apply = function (skeleton) {
        lastAppliedShakes.forEach(function (s, bone) {
          bone.rotation -= s.rot;
          bone.x -= s.x;
          bone.y -= s.y;
        });
        lastAppliedShakes.clear();

        var result = orig(skeleton);

        if (hiddenSlots.size > 0) {
          hiddenSlots.forEach(function (name) {
            var slot = skeleton.findSlot(name);
            if (slot) slot.setAttachment(null);
          });
        }
        if (highlightedSlot !== null) {
          skeleton.slots.forEach(function (s) {
            if (s.data.name === highlightedSlot) {
              s.color.r = 0.67; s.color.g = 0.87; s.color.b = 1.0;
            } else {
              s.color.r = 0.4; s.color.g = 0.4; s.color.b = 0.4;
            }
          });
        }
        if (boneShakes.size > 0) {
          boneShakes.forEach(function (s, bone) {
            bone.rotation += s.rot;
            bone.x += s.x;
            bone.y += s.y;
            lastAppliedShakes.set(bone, { rot: s.rot, x: s.x, y: s.y });
          });
        }
        return result;
      };
    }

    function drawCustomBoneOverlay() {
      if (!currentSkeleton) return;
      // World units per CSS pixel: with renderer.resize(Expand), the camera
      // viewport equals canvas.width = clientWidth*dpr, so 1 CSS px = zoom*dpr
      // world units. Scale dot/pulse sizes by this so they look constant on
      // screen across zoom levels.
      var dpr = window.devicePixelRatio || 1;
      var px = renderer.camera.zoom * dpr;
      var bones = currentSkeleton.bones;

      for (var i = 0; i < bones.length; i++) {
        var b = bones[i];
        if (!b.parent) continue;
        renderer.line(b.parent.worldX, b.parent.worldY, b.worldX, b.worldY, BONE_LINE_COLOR);
      }

      if (lastClickPoint) {
        lastClickPoint.age += 1;
        var pulse = Math.max(0, 1 - lastClickPoint.age / 60);
        if (pulse > 0) {
          BONE_PULSE.a = 0.4 * pulse;
          renderer.circle(false, lastClickPoint.x, lastClickPoint.y, lastClickPoint.radius, BONE_PULSE, 32);
        } else {
          lastClickPoint = null;
        }
      }

      var dotR = 3 * px;
      var headDescendants = currentSkeleton._headDescendants;
      for (var j = 0; j < bones.length; j++) {
        var bone = bones[j];
        var s = boneShakes.get(bone);
        var isHead = headDescendants && headDescendants.has(bone);
        if (s) {
          var intensity = Math.min(1, Math.abs(s.rot) * 4 + Math.abs(s.vel) * 8);
          renderer.circle(true, bone.worldX, bone.worldY, dotR * (1.5 + intensity), BONE_RED, 12);
        } else if (isHead) {
          renderer.circle(true, bone.worldX, bone.worldY, dotR, BONE_PURPLE, 12);
        } else if (meshBones.has(bone)) {
          renderer.circle(true, bone.worldX, bone.worldY, dotR, BONE_GREEN, 12);
        } else {
          renderer.circle(true, bone.worldX, bone.worldY, dotR * 0.7, BONE_GRAY, 12);
        }
      }
    }

    function render(now) {
      var dt = lastTime ? (now - lastTime) / 1000 : 0;
      lastTime = now;

      renderer.resize(spine.ResizeMode.Expand);
      gl.clearColor(0.102, 0.102, 0.102, 1.0);
      gl.clear(gl.COLOR_BUFFER_BIT);

      if (currentSkeleton && currentState) {
        if (Math.abs(targetTurnX - currentTurnX) > 0.1) {
          currentTurnX += (targetTurnX - currentTurnX) * 0.25;
        }

        // Pre-populate every (non-root) bone in boneShakes so the lean target
        // rotation can be driven through the same state.apply hook used by
        // the click-shake.
        if (Math.abs(currentTurnX) > 0.1) {
          L2D.computeHeadStructure(currentSkeleton);
          currentSkeleton.bones.forEach(function (bone) {
            if (!bone.parent) return;
            if (!boneShakes.has(bone)) {
              boneShakes.set(bone, {
                baseRot: bone.rotation, baseX: bone.x, baseY: bone.y,
                rot: 0, vel: 0, x: 0, y: 0, vx: 0, vy: 0
              });
            }
          });
        }

        if (boneShakes.size > 0) {
          var stiffness = 0.25;
          var damping = 0.85;
          var maxDepth = currentSkeleton._maxDepth || 0;
          var headDescendants = currentSkeleton._headDescendants;
          var descCounts = currentSkeleton._descCounts;
          boneShakes.forEach(function (s, bone) {
            // Lean target: scale by depth^1.5, but lock head descendants and
            // leaf-ish bones (<3 descendants) to prevent facial distortion.
            var factor = 0;
            if (maxDepth && bone._hDepth >= 1) {
              var descCount = descCounts ? (descCounts.get(bone) || 0) : 0;
              var isHubDescendant = headDescendants && headDescendants.has(bone);
              if (!(isHubDescendant || descCount < 3)) {
                factor = Math.pow(bone._hDepth / maxDepth, 1.5);
              }
            }
            var targetRot = currentTurnX * 0.02 * factor;

            s.rot += s.vel;
            s.vel *= damping;
            s.rot += (targetRot - s.rot) * 0.2;

            s.vx += -s.x * stiffness;
            s.vy += -s.y * stiffness;
            s.vx *= damping;
            s.vy *= damping;
            s.x += s.vx;
            s.y += s.vy;

            if (Math.abs(targetTurnX) < 0.1 &&
                Math.abs(s.rot) < 0.01 && Math.abs(s.vel) < 0.01 &&
                Math.abs(s.x) < 0.05 && Math.abs(s.vx) < 0.05 &&
                Math.abs(s.y) < 0.05 && Math.abs(s.vy) < 0.05) {
              boneShakes.delete(bone);
            }
          });
        }

        currentState.update(dt);
        currentState.apply(currentSkeleton);
        currentSkeleton.updateWorldTransform();

        renderer.begin();
        renderer.drawSkeleton(currentSkeleton, pma);
        if (showBones) drawCustomBoneOverlay();
        renderer.end();
      }

      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);
  </script>
</body>
</html>
