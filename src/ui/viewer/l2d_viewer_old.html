<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #hint {
      position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      color: #555; font: 12px/1 sans-serif;
      pointer-events: none; white-space: nowrap;
    }
    #error {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #f66; font: 14px sans-serif;
      display: none; text-align: center; max-width: 80%; white-space: pre-wrap;
    }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #888; font: 14px sans-serif;
    }
  </style>
</head>
<body>
  <div id="hint">Left-drag to pan &nbsp;|&nbsp; Scroll to zoom &nbsp;|&nbsp; Press B to toggle bones</div>
  <div id="error"></div>
  <div id="loading">Loading...</div>

  <script src="pixi.min.js"></script>
  <script src="pixi-spine.js"></script>

  <script>
    document.getElementById('loading').style.display = 'none';

    // Nikke models typically use Straight Alpha rather than Premultiplied Alpha.
    // We configure PixiJS to handle this to prevent dark outlines on blended parts.
    PIXI.BaseTexture.defaultOptions.alphaMode = PIXI.ALPHA_MODES.NO_PREMULTIPLIED_ALPHA;
    PIXI.Assets.setPreferences({ preferCreateImageBitmap: false });

    var app = new PIXI.Application({
      width: window.innerWidth,
      height: window.innerHeight,
      backgroundColor: 0x1a1a1a,
      resolution: window.devicePixelRatio || 1,
      autoDensity: true,
      resizeTo: window
    });
    document.body.appendChild(app.view);

    var currentSpine = null;
    var spineShake = {
      x: 0, y: 0,
      vx: 0, vy: 0
    };

    var container = new PIXI.Container();
    app.stage.addChild(container);

    var boneOverlay = new PIXI.Graphics();
    container.addChild(boneOverlay);
    var showBones = false;
    var lastClickPoint = null; // { x, y, radius, age } in skeleton-local space

    window.addEventListener('keydown', function(e) {
      if (e.key === 'b' || e.key === 'B') {
        showBones = !showBones;
        if (!showBones) boneOverlay.clear();
        console.log('BONES_TOGGLED:' + showBones);
      }
    });

    var isDragging = false;
    var prevX = 0, prevY = 0;
    var scaleTarget = 1.0;
    var scaleCurrent = 1.0;

    var boneShakes = new Map(); // bone -> { rotationOffset, velocity }
    var meshBones = new Set();  // bones that actually drive a rendered slot/mesh

    let downTime = 0;
    let downPos = null;

    app.view.addEventListener('pointerdown', function(e) {
      if (e.button === 0) {
        downTime = Date.now();
        downPos = { x: e.clientX, y: e.clientY };
      }

      // keep your drag logic
      if (e.button === 0 || e.button === 2 || e.button === 1) {
        isDragging = true;
        prevX = e.clientX;
        prevY = e.clientY;
      }
    });

    window.addEventListener('pointerup', function(e) {
      isDragging = false;

      // detect click (not drag)
      if (!downPos) return;

      const dx = e.clientX - downPos.x;
      const dy = e.clientY - downPos.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const dt = Date.now() - downTime;

      if (dist < 5 && dt < 200) {
        const c = clientToCanvas(e.clientX, e.clientY);
        handleBoneClick(c.x, c.y);
      }
    });

    // Map viewport (CSS pixel) coordinates to PIXI stage coordinates.
    // Using getBoundingClientRect handles any DPI mismatch between the host
    // (e.g. PyQt6 WebEngine) and the canvas's internal resolution.
    function clientToCanvas(clientX, clientY) {
      const rect = app.view.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width * app.screen.width;
      const y = (clientY - rect.top) / rect.height * app.screen.height;
      return { x: x, y: y };
    }
    window.addEventListener('pointermove', function(e) {
      if (isDragging) {
        var dx = e.clientX - prevX;
        var dy = e.clientY - prevY;
        container.x += dx;
        container.y += dy;
        prevX = e.clientX;
        prevY = e.clientY;
      }
    });

    app.view.addEventListener('wheel', function(e) {
      var ds = e.deltaY > 0 ? 0.9 : 1.1;
      scaleTarget *= ds;
      e.preventDefault();
    }, {passive: false});

    app.ticker.add(function() {     
      if (Math.abs(scaleTarget - scaleCurrent) > 0.001) {
        scaleCurrent += (scaleTarget - scaleCurrent) * 0.1;
        var cx = app.screen.width / 2;
        var cy = app.screen.height / 2;
        container.x = cx + (container.x - cx) * (scaleCurrent / container.scale.x);
        container.y = cy + (container.y - cy) * (scaleCurrent / container.scale.y);
        container.scale.set(scaleCurrent);
      }
  
      // Spring physics for shake - actual bone writes happen in the hook on
      // state.apply (so they survive pixi-spine's per-frame animation pass).
      if (boneShakes.size > 0) {
        const stiffness = 0.25;
        const damping = 0.85;

        boneShakes.forEach((s, bone) => {
          s.vel += -s.rot * stiffness;
          s.vel *= damping;
          s.rot += s.vel;

          s.vx += -s.x * stiffness;
          s.vy += -s.y * stiffness;
          s.vx *= damping;
          s.vy *= damping;
          s.x += s.vx;
          s.y += s.vy;

          if (Math.abs(s.rot) < 0.01 && Math.abs(s.vel) < 0.01 &&
              Math.abs(s.x) < 0.05 && Math.abs(s.vx) < 0.05 &&
              Math.abs(s.y) < 0.05 && Math.abs(s.vy) < 0.05) {
            boneShakes.delete(bone);
          }
        });
      }

      if (showBones) drawBoneOverlay();
    });

    var loadToken = 0;
    var availableAnimations = [];
    var hiddenSlots = new Set();
    var originalAttachments = new Map(); // slotName -> attachment at load time
    var highlightedSlot = null;
    var currentModelUrl = null;
    var currentResource = null; // resource from PIXI.Assets, kept for cleanup on next load

    window.playAnimation = function(index) {
      if (!currentSpine) return;
      // Index -1 = "Static Pose" from the panel: clear any animation and
      // snap bones/slots to the model's authored setup pose.
      if (index === -1) {
        currentSpine.state.clearTracks();
        currentSpine.skeleton.setToSetupPose();
        return;
      }
      if (index < 0 || index >= availableAnimations.length) return;
      var animName = availableAnimations[index];
      currentSpine.state.setAnimation(0, animName, true);
    };

    window.setAnimPaused = function(paused) {
      if (currentSpine) {
        currentSpine.state.timeScale = paused ? 0 : 1;
      }
    };

    window.highlightSlot = function(slotName) {
      highlightedSlot = slotName;
    };

    window.clearHighlight = function() {
      highlightedSlot = null;
      if (!currentSpine) return;
      currentSpine.skeleton.slots.forEach(function(s) {
        s.color.r = 1; s.color.g = 1; s.color.b = 1; s.color.a = 1;
      });
    };

    window.setSlotVisible = function(slotName, visible) {
      if (!currentSpine) return;
      var slot = currentSpine.skeleton.findSlot(slotName);
      if (!slot) return;
      if (visible) {
        hiddenSlots.delete(slotName);
        slot.attachment = originalAttachments.get(slotName) || null;
      } else {
        hiddenSlots.add(slotName);
        slot.attachment = null;
      }
    };

    window.setNeighborCount = function(n) { shakeNeighborCount = n; };
    window.setBounceForce = function(n) { shakeBounceForce = n; };
    window.setShowBones = function(visible) {
      showBones = visible;
      if (!showBones) boneOverlay.clear();
    };

    window.setPremultipliedAlpha = function(enabled) {
      PIXI.BaseTexture.defaultOptions.alphaMode = enabled
        ? PIXI.ALPHA_MODES.PREMULTIPLIED_ALPHA
        : PIXI.ALPHA_MODES.NO_PREMULTIPLIED_ALPHA;
      if (currentModelUrl) {
        window.loadModel(currentModelUrl);
      }
    };

    function unloadPreviousModel(skelUrl, resource) {
      var urls = [];
      if (skelUrl) {
        urls.push(skelUrl);
        var dot = skelUrl.lastIndexOf('.');
        if (dot >= 0) urls.push(skelUrl.substring(0, dot) + '.atlas');
      }
      if (resource && resource.spineAtlas && resource.spineAtlas.pages) {
        resource.spineAtlas.pages.forEach(function(p) {
          var bt = p.baseTexture;
          if (bt) {
            var src = bt.resource && (bt.resource.url || bt.resource.src);
            if (src) urls.push(src);
            try { bt.destroy(); } catch (e) {}
          }
        });
      }
      if (urls.length === 0) return Promise.resolve();
      return PIXI.Assets.unload(urls).catch(function() {});
    }

    window.loadModel = function(url) {
      var prevUrl = currentModelUrl;
      var prevResource = currentResource;
      currentModelUrl = url;
      currentResource = null;
      document.getElementById('error').style.display = 'none';
      if (currentSpine) {
        container.removeChild(currentSpine);
        currentSpine.destroy();
        currentSpine = null;
      }

      var currentToken = ++loadToken;

      unloadPreviousModel(prevUrl, prevResource).then(function() {
        if (currentToken !== loadToken) return null;
        return PIXI.Assets.load(url);
      }).then(function(resource) {
        if (currentToken !== loadToken) return;

        if (resource && resource.spineData) {
          currentResource = resource;
          currentSpine = new PIXI.spine.Spine(resource.spineData);
          // Hook state.apply so shake offsets land AFTER animation, every
          // frame, regardless of whether pixi-spine drives update or we do.
          // This is what makes shake work for animation-keyed bones.
          installShakeHook(currentSpine);
        } else {
           throw new Error("Invalid spine data or missing resources (.atlas / .png).");
        }

        container.addChild(currentSpine);
        container.addChild(boneOverlay); // keep overlay on top of newly added spine

        meshBones = computeMeshBones(currentSpine);
        console.log('Mesh-driving bones: ' + meshBones.size + ' / ' + currentSpine.skeleton.bones.length);

        var localRect = currentSpine.getLocalBounds();
        currentSpine.position.set(-localRect.x - localRect.width / 2, -localRect.y - localRect.height / 2);

        var sw = app.screen.width;
        var sh = app.screen.height;
        var s = Math.min(sw / localRect.width, sh / localRect.height) * 0.9;
        if (!isFinite(s) || s === 0) s = 1.0;
        
        container.scale.set(s);
        scaleTarget = s;
        scaleCurrent = s;
        container.x = sw / 2;
        container.y = sh / 2;

        availableAnimations = currentSpine.spineData.animations.map(function(a) { return a.name; });
        console.log('MODEL_ANIMATIONS:' + JSON.stringify(availableAnimations));

        hiddenSlots.clear();
        originalAttachments.clear();
        highlightedSlot = null;
        showBones = false;
        boneOverlay.clear();
        currentSpine.skeleton.slots.forEach(function(s) {
          originalAttachments.set(s.data.name, s.getAttachment ? s.getAttachment() : s.attachment);
        });
        var slotNames = currentSpine.skeleton.slots
          .filter(function(s) { return originalAttachments.get(s.data.name); })
          .map(function(s) { return s.data.name; });
        console.log('MODEL_SLOTS:' + JSON.stringify(slotNames));

        if (availableAnimations.length > 0) {
          var idleIdx = availableAnimations.findIndex(function(n) { return n.toLowerCase().includes('idle'); });
          window.playAnimation(idleIdx >= 0 ? idleIdx : 0);
        }
      }).catch(function(err) {
        if (currentToken !== loadToken) return;
        var el = document.getElementById('error');
        el.textContent = 'Failed to load model:\n' + (err.message || String(err));
        el.style.display = 'block';
      });
    };

    function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
      const dx = x2 - x1;
      const dy = y2 - y1;

      if (dx === 0 && dy === 0) {
        return Math.hypot(px - x1, py - y1);
      }

      let t = ((px - x1) * dx + (py - y1) * dy) / (dx * dx + dy * dy);
      t = Math.max(0, Math.min(1, t));

      const cx = x1 + t * dx;
      const cy = y1 + t * dy;

      return Math.hypot(px - cx, py - cy);
    };

    // Build the set of bones that actually move visible geometry:
    //   - the slot.bone of every slot with an attachment
    //   - every bone weighted by a weighted-mesh attachment
    // Bones outside this set are control/IK/parent rigs - shaking them moves
    // nothing on screen.
    function computeMeshBones(spine) {
      const set = new Set();
      const allBones = spine.skeleton.bones;
      const slots = spine.skeleton.slots;
      for (let si = 0; si < slots.length; si++) {
        const slot = slots[si];
        const att = slot.getAttachment ? slot.getAttachment() : slot.attachment;
        if (!att) continue;

        if (att.bones && att.bones.length) {
          // Weighted mesh: bones array is [count, idx, idx, ..., count, idx, ...]
          const arr = att.bones;
          let i = 0;
          while (i < arr.length) {
            const count = arr[i++];
            for (let j = 0; j < count; j++) {
              const idx = arr[i++];
              if (idx >= 0 && idx < allBones.length) set.add(allBones[idx]);
            }
          }
        } else if (slot.bone) {
          set.add(slot.bone);
        }
      }
      return set;
    }

    function handleBoneClick(screenX, screenY) {
      if (!currentSpine) return;

      // toLocal on the spine (not the container) yields skeleton-space, which
      // is what bone.worldX/worldY are in. Using container-space here was off
      // by currentSpine.position - that's why the affected area was below the
      // cursor.
      const point = new PIXI.Point(screenX, screenY);
      const local = currentSpine.toLocal(point);

      const bones = currentSpine.skeleton.bones;

      let bestBone = null;
      let bestDist = Infinity;

      for (let i = 0; i < bones.length; i++) {
        const b = bones[i];
        if (!b.parent) continue;       // never target the root
        if (!meshBones.has(b)) continue; // skip control bones that don't drive geometry

        const dx = local.x - b.worldX;
        const dy = local.y - b.worldY;
        const dist = dx * dx + dy * dy;

        if (dist < bestDist) {
          bestDist = dist;
          bestBone = b;
        }
      }

      if (!bestBone) return;

      applyShakeChain(bestBone, local);
    }

    // How many of the closest mesh-driving bones (to the clicked bone) to
    // shake. Density-independent, so it feels the same on small and complex
    // skeletons. Lower = more localized impact.
    var shakeNeighborCount = 6;
    var shakeBounceForce = 4;
    // Hard cap so clicks in empty space don't reach across the whole figure.
    const SHAKE_RADIUS_FRAC = 0.08;

    function applyShakeChain(clickedBone, localPoint) {
      const bounds = currentSpine.getLocalBounds();
      const maxRadius = Math.hypot(bounds.width, bounds.height) * SHAKE_RADIUS_FRAC;
      const maxRadiusSq = maxRadius * maxRadius;

      // Collect mesh-driving bones with their squared distance from click.
      const bones = currentSpine.skeleton.bones;
      const candidates = [];
      for (let i = 0; i < bones.length; i++) {
        const b = bones[i];
        if (!b.parent) continue;
        if (!meshBones.has(b)) continue;

        const dx = b.worldX - clickedBone.worldX;
        const dy = b.worldY - clickedBone.worldY;
        const distSq = dx * dx + dy * dy;
        if (distSq > maxRadiusSq) continue;

        candidates.push({ bone: b, distSq: distSq });
      }

      // Closest first, then keep the top N.
      candidates.sort((a, b) => a.distSq - b.distSq);
      const picked = candidates.slice(0, shakeNeighborCount);

      // Use the farthest picked bone's distance as the falloff radius - gives
      // smooth distance-based falloff regardless of how many bones we kept.
      const falloffRadius = picked.length > 0
        ? Math.max(Math.sqrt(picked[picked.length - 1].distSq), 1)
        : maxRadius;

      lastClickPoint = { x: localPoint.x, y: localPoint.y, radius: falloffRadius, age: 0 };

      for (let i = 0; i < picked.length; i++) {
        const dist = Math.sqrt(picked[i].distSq);
        const falloff = 1 - dist / falloffRadius;
        applyShake(picked[i].bone, (shakeBounceForce + 1) * 0.5 * falloff);
      }
    }

    function drawBoneOverlay() {
      boneOverlay.clear();
      if (!currentSpine) return;

      // Convert spine-local coords to container-local (spine has its own offset).
      const ox = currentSpine.position.x;
      const oy = currentSpine.position.y;
      const sx = currentSpine.scale.x;
      const sy = currentSpine.scale.y;
      const tx = (x) => ox + x * sx;
      const ty = (y) => oy + y * sy;

      const bones = currentSpine.skeleton.bones;

      // Bone segments from each bone to its parent.
      boneOverlay.lineStyle(1 / container.scale.x, 0x4477aa, 0.6);
      for (let i = 0; i < bones.length; i++) {
        const b = bones[i];
        if (!b.parent) continue;
        boneOverlay.moveTo(tx(b.parent.worldX), ty(b.parent.worldY));
        boneOverlay.lineTo(tx(b.worldX), ty(b.worldY));
      }

      // Click radius pulse.
      if (lastClickPoint) {
        lastClickPoint.age += 1;
        const pulse = Math.max(0, 1 - lastClickPoint.age / 60);
        if (pulse > 0) {
          boneOverlay.lineStyle(2 / container.scale.x, 0xffff66, 0.4 * pulse);
          boneOverlay.drawCircle(tx(lastClickPoint.x), ty(lastClickPoint.y), lastClickPoint.radius * sx);
          boneOverlay.lineStyle(0);
        } else {
          lastClickPoint = null;
        }
      }

      // Bone joints:
      //   red + larger = currently shaking
      //   green        = mesh-driving (slot bone or weighted-mesh bone) - clickable
      //   gray         = control / IK / parent rig - shaking it has no visible effect
      const dotR = 3 / container.scale.x;
      for (let i = 0; i < bones.length; i++) {
        const b = bones[i];
        const affected = boneShakes.has(b);
        if (affected) {
          const s = boneShakes.get(b);
          const intensity = Math.min(1, Math.abs(s.rot) * 4 + Math.abs(s.vel) * 8);
          boneOverlay.beginFill(0xff5544, 0.9);
          boneOverlay.drawCircle(tx(b.worldX), ty(b.worldY), dotR * (1.5 + intensity));
          boneOverlay.endFill();
        } else if (meshBones.has(b)) {
          boneOverlay.beginFill(0x66dd88, 0.85);
          boneOverlay.drawCircle(tx(b.worldX), ty(b.worldY), dotR);
          boneOverlay.endFill();
        } else {
          boneOverlay.beginFill(0x666666, 0.4);
          boneOverlay.drawCircle(tx(b.worldX), ty(b.worldY), dotR * 0.7);
          boneOverlay.endFill();
        }
      }
    }

    // Patch this spine's state.apply so shake offsets are added immediately
    // after animation is applied, every frame. This way the offsets are part
    // of the state pixi-spine reads when it builds mesh geometry.
    function installShakeHook(spine) {
      const orig = spine.state.apply.bind(spine.state);
      spine.state.apply = function(skeleton) {
        const result = orig(skeleton);
        if (hiddenSlots.size > 0) {
          hiddenSlots.forEach(function(name) {
            var slot = skeleton.findSlot(name);
            if (slot) slot.attachment = null;
          });
        }
        if (highlightedSlot !== null) {
          skeleton.slots.forEach(function(s) {
            if (s.data.name === highlightedSlot) {
              s.color.r = 0.67; s.color.g = 0.87; s.color.b = 1.0;
            } else {
              s.color.r = 0.4; s.color.g = 0.4; s.color.b = 0.4;
            }
          });
        }
        if (boneShakes.size > 0) {
          const EPS = 0.0001;
          boneShakes.forEach((s, bone) => {
            // Auto-detect per frame: did state.apply just overwrite our
            // previous write? If yes, the bone is keyed by the animation and
            // we add as a delta. If no, nothing animates this bone, so we
            // anchor to the captured baseline. This stays correct regardless
            // of pixi-spine version or timeline schema.
            const keyedRot = s.lastRot === undefined ||
                             Math.abs(bone.rotation - s.lastRot) > EPS;
            const keyedX   = s.lastX === undefined ||
                             Math.abs(bone.x - s.lastX) > EPS;
            const keyedY   = s.lastY === undefined ||
                             Math.abs(bone.y - s.lastY) > EPS;

            bone.rotation = (keyedRot ? bone.rotation : s.baseRot) + s.rot;
            bone.x        = (keyedX   ? bone.x        : s.baseX)   + s.x;
            bone.y        = (keyedY   ? bone.y        : s.baseY)   + s.y;

            s.lastRot = bone.rotation;
            s.lastX   = bone.x;
            s.lastY   = bone.y;
          });
        }
        return result;
      };
    }

    function applyShake(bone, strength = 1.0) {
      if (!boneShakes.has(bone)) {
        boneShakes.set(bone, {
          baseRot: bone.rotation,
          baseX: bone.x,
          baseY: bone.y,
          rot: 0, vel: 0,
          x: 0, y: 0,
          vx: 0, vy: 0
        });
      }

      const s = boneShakes.get(bone);

      // Bounce impulse - upward kick + sideways jiggle + rotation jitter.
      s.vy += -8 * strength;
      s.vx += (Math.random() - 0.5) * 6 * strength;
      s.vel += (Math.random() - 0.5) * 4 * strength;
    }
    
  </script>
</body>
</html>
