<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #hint {
      position: absolute; bottom: 12px; left: 50%;
      transform: translateX(-50%);
      color: #555; font: 12px/1 sans-serif;
      pointer-events: none; white-space: nowrap;
    }
    #error {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #f66; font: 14px sans-serif;
      display: none; text-align: center; max-width: 80%; white-space: pre-wrap;
    }
    #loading {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #888; font: 14px sans-serif;
    }
  </style>
</head>
<body>
  <div id="hint">Drag to orbit &nbsp;|&nbsp; Scroll to zoom &nbsp;|&nbsp; Right-drag to pan</div>
  <div id="error"></div>
  <div id="loading">Loading...</div>

  <!-- Bundled locally — no internet required -->
  <script src="three.min.js"></script>
  <script src="OrbitControls.js"></script>
  <script src="GLTFLoader.js"></script>

  <script>
    document.getElementById('loading').style.display = 'none';

    var clock  = new THREE.Clock();
    var mixer  = null;
    var clips  = [];
    var activeAction = null;
    var isPaused = false;

    var renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.insertBefore(renderer.domElement, document.body.firstChild);

    var scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a1a);

    var camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.001, 100000);
    camera.position.set(3, 3, 3);

    var controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.mouseButtons = {
      LEFT: THREE.MOUSE.ROTATE,
      MIDDLE: THREE.MOUSE.DOLLY,
      RIGHT: THREE.MOUSE.PAN
    };

    var BASE_HEMI = 2.0;
    var BASE_SUN = 1.5;
    var BASE_HEADLAMP = 1.5;

    var hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, BASE_HEMI);
    hemiLight.position.set(0, 20, 0);
    scene.add(hemiLight);

    var sun = new THREE.DirectionalLight(0xffffff, BASE_SUN);
    sun.position.set(5, 10, 5);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    scene.add(sun);

    // Attach a headlamp to the camera so the side you're viewing is always lit
    scene.add(camera);
    var headlamp = new THREE.DirectionalLight(0xffffff, BASE_HEADLAMP);
    headlamp.position.set(0, 0, 1);
    camera.add(headlamp);

    window.setLightBrightness = function(multiplier) {
      hemiLight.intensity = BASE_HEMI * multiplier;
      sun.intensity = BASE_SUN * multiplier;
      headlamp.intensity = BASE_HEADLAMP * multiplier;
    };

    var loader = new THREE.GLTFLoader();
    var currentRoot = null;

    window.playAnimation = function(index) {
      if (activeAction) { activeAction.stop(); activeAction = null; }
      isPaused = false;
      if (index < 0 || !mixer || !clips[index]) return;
      activeAction = mixer.clipAction(clips[index]);
      activeAction.play();
    };

    window.setAnimPaused = function(paused) {
      isPaused = paused;
      if (activeAction) activeAction.paused = paused;
    };

    window.setMeshVisible = function(name, visible) {
      if (!currentRoot) return;
      currentRoot.traverse(function(node) {
        if (node.isMesh && node.name === name) node.visible = visible;
      });
    };

    function disposeNode(node) {
      if (node.geometry) node.geometry.dispose();
      if (node.material) {
        var mats = Array.isArray(node.material) ? node.material : [node.material];
        for (var i = 0; i < mats.length; i++) {
          if (mats[i].map) mats[i].map.dispose();
          mats[i].dispose();
        }
      }
    }

    function disposeHierarchy(root) {
      if (!root) return;
      root.traverse(function(node) {
        if (node.isMesh) disposeNode(node);
      });
    }

    var loadToken = 0;

    window.loadModel = function(url) {
      document.getElementById('error').style.display = 'none';
      if (mixer) { mixer.stopAllAction(); mixer = null; }
      if (currentRoot) { 
        scene.remove(currentRoot);
        disposeHierarchy(currentRoot);
        currentRoot = null; 
      }
      clips = [];
      activeAction = null;
      isPaused = false;

      var currentToken = ++loadToken;

      loader.load(url, function(gltf) {
        if (currentToken !== loadToken) {
          disposeHierarchy(gltf.scene);
          return;
        }

        currentRoot = gltf.scene;
        currentRoot.traverse(function(node) {
          if (node.isMesh) {
            node.castShadow = true;
            node.receiveShadow = true;
            if (node.material) {
              var mats = Array.isArray(node.material) ? node.material : [node.material];
              mats.forEach(function(mat) {
                if (mat.emissiveIntensity !== undefined) {
                  mat.emissiveIntensity *= 3.0; // Boost emissive power
                }
              });
            }
          }
        });
        scene.add(currentRoot);

        var box    = new THREE.Box3().setFromObject(currentRoot);
        var size   = box.getSize(new THREE.Vector3()).length();
        var center = box.getCenter(new THREE.Vector3());

        currentRoot.position.y -= box.min.y;
        var worldCenterY = center.y - box.min.y;

        camera.near = size / 1000;
        camera.far  = size * 1000;
        camera.updateProjectionMatrix();
        camera.position.set(center.x + size * 1.2, worldCenterY + size * 0.4, center.z + size * 1.2);
        camera.lookAt(center.x, worldCenterY, center.z);
        controls.target.set(center.x, worldCenterY, center.z);
        controls.update();

        clips = gltf.animations || [];
        if (clips.length > 0) {
          mixer = new THREE.AnimationMixer(currentRoot);
          var animNames = clips.map(function(c, i) { return c.name || ('Animation ' + (i + 1)); });
          console.log('MODEL_ANIMATIONS:' + JSON.stringify(animNames));
          window.playAnimation(0);
        } else {
          console.log('MODEL_ANIMATIONS:[]');
        }

        var meshNames = [];
        currentRoot.traverse(function(node) {
          if (node.isMesh && node.name && meshNames.indexOf(node.name) === -1) {
            meshNames.push(node.name);
          }
        });
        console.log('MODEL_MESHES:' + JSON.stringify(meshNames));
      }, undefined, function(err) {
        if (currentToken !== loadToken) return;

        var el = document.getElementById('error');
        el.textContent = 'Failed to load model:\n' + (err.message || String(err));
        el.style.display = 'block';
      });
    };

    window.addEventListener('resize', function() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    (function animate() {
      requestAnimationFrame(animate);
      var delta = clock.getDelta();
      if (mixer && !isPaused) mixer.update(delta);
      controls.update();
      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
